name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (src)
        run: pnpm typecheck

      - name: Typecheck (plugin)
        run: pnpm typecheck:plugin

      - name: Unit tests
        run: pnpm test

      - name: Build plugin bundle
        run: pnpm build:plugin

      - name: Build MCP bundle
        run: pnpm build:mcp

      - name: MCP stdio stdout must be clean (first byte '{')
        run: |
          FIRST=$(printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}\n' | node dist-mcp/server.js | head -c 1)
          if [ "$FIRST" != "{" ]; then
            echo "MCP stdout not clean — first byte was '$FIRST', expected '{'"
            exit 1
          fi
          echo "MCP stdout clean."
